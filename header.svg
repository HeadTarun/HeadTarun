    <rect x="806" y="124" width="28" height="4" fill="rgba(192,132,252,0.18)"/>
    <rect x="802" y="128" width="44" height="4" fill="rgba(192,132,252,0.15)"/>
    <rect x="798" y="132" width="56" height="4" fill="rgba(192,132,252,0.12)"/>
