  <circle cx="560" cy="30"  r="2"   fill="#c084fc"><animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="640" cy="50"  r="1.3" fill="#c084fc"><animate attributeName="opacity" values="0.5;1.0;0.5" dur="2.6s" repeatCount="indefinite"/></circle>
