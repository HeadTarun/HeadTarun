  <!-- ── CENTRE TEXT ── -->
  <!-- Sub label -->
  <text x="450" y="118" font-family="monospace" font-size="11" fill="#7c5ca8" text-anchor="middle" letter-spacing="3">FULL STACK DEVELOPER · ML ENTHUSIAST · OPEN SOURCE</text>

  <!-- Main name - pixel style approximated with bold mono -->
  <text x="450" y="165" font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="#c084fc" text-anchor="middle" letter-spacing="2">
    Hey, I'm Tarun Dange 👾
    <animate attributeName="opacity" values="1;0.85;1" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- Animated underline -->
  <rect x="200" y="175" width="500" height="1" fill="#c084fc" opacity="0.3">
    <animate attributeName="width" values="0;500;500" dur="1.5s" fill="freeze"/>
    <animate attributeName="x" values="450;200;200" dur="1.5s" fill="freeze"/>
  </rect>

  <!-- Role tag cycling -->
  <text x="450" y="200" font-family="'Courier New', monospace" font-size="13" fill="#86efac" text-anchor="middle" letter-spacing="1">
    <tspan opacity="1">[ Building Cool Stuff 🚀 ]</tspan>
  </text>

  <!-- bottom border decoration -->
  <rect x="0" y="292" width="900" height="1" fill="#3d1f6b"/>
  <rect x="350" y="290" width="200" height="3" fill="#c084fc" opacity="0.5" rx="1"/>
