  <circle cx="860" cy="15"  r="2"   fill="#c084fc"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="70"  cy="200" r="1.5" fill="#c084fc"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="3.0s" repeatCount="indefinite"/></circle>
  <circle cx="170" cy="240" r="1"   fill="#c084fc"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="1.8s" repeatCount="indefinite"/></circle>
  <circle cx="260" cy="180" r="2"   fill="#c084fc"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="370" cy="260" r="1.2" fill="#c084fc"><animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.0s" repeatCount="indefinite"/></circle>
