    <rect x="42"  y="212" width="16" height="4" fill="#9333ea"/>
    <rect x="42"  y="216" width="16" height="4" fill="#7c3aed"/>
    <rect x="42"  y="220" width="16" height="4" fill="#6d28d9"/>
